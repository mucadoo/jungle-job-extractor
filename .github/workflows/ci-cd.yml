name: CI/CD

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  test-and-build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.x'
        cache: 'npm'

    - name: Install dependencies
      run: npm install

    - name: Run tests
      run: npm run test

    - name: Run build
      run: npm run build

    - name: Package extension
      run: |
        cd dist
        zip -r ../jungle-job-extractor.zip .
        cd ..

    - name: Upload Build Artifact
      uses: actions/upload-artifact@v4
      with:
        name: extension-zip
        path: jungle-job-extractor.zip

  release:
    needs: test-and-build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: extension-zip

      - name: Create Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          files: jungle-job-extractor.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # Note: To automate Chrome Web Store upload, you would add a job here
  # using an action like 'chrome-extension-upload'. 
  # This requires CLIENT_ID, CLIENT_SECRET, and REFRESH_TOKEN from Google Console.
